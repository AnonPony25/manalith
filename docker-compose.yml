  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   environment:
  #     SPRING_PROFILES_ACTIVE: dev
  #     POSTGRES_URL: jdbc:postgresql://postgres:5432/manalith
