spring:
  application:
    name: manalith

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/manalith}
    username: ${POSTGRES_USER:manalith}
    password: ${POSTGRES_PASSWORD:manalith}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  security:
    oauth2:
      client:
        registration:
          discord:
            client-id: ${DISCORD_CLIENT_ID:}
            client-secret: ${DISCORD_CLIENT_SECRET:}
            scope: identify,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: read:user,user:email

manalith:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-at-least-256-bits}
    access-token-expiry-minutes: 15
    refresh-token-expiry-days: 30
  scryfall:
    bulk-data-url: https://api.scryfall.com/bulk-data
    user-agent: "Manalith/0.1.0 (https://github.com/manalith/manalith)"
    sync-cron: "0 0 4 * * *"   # 4 AM daily
  game:
    action-timeout-seconds: 45
    action-warning-seconds: 15
    max-players-per-room: 4

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,text/plain

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    dev.manalith: DEBUG
    org.springframework.web.socket: INFO
